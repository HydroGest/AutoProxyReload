name: Build Project

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Install WiX Toolset
        run: choco install wixtoolset -y

      - name: Build JAR with Gradle
        run: ./gradlew jar

      - name: Build EXE with jpackage
        shell: cmd
        run: |
          mkdir build\dist
          :: 这里直接复制你的 jar，保持名称一致
          copy build\libs\AutoProxyReload-1.0-SNAPSHOT.jar build\dist\app.jar
          
          jpackage --type exe ^
            --name AutoProxyReload ^
            --input build\dist ^
            --main-jar app.jar ^
            --win-dir-chooser ^
            --win-menu ^
            --win-shortcut ^
            --java-options "-Dfile.encoding=GBK"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Build-Output
          path: |
            build/dist/AutoProxyReload-1.0.exe