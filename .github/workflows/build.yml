name: Build Project

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR with Gradle
        run: ./gradlew jar

      - name: Build EXE with jpackage
        shell: cmd
        run: |
          mkdir build\dist
          copy build\libs\*.jar build\dist\app.jar
          
          jpackage --type exe ^
            --name AutoProxyReload ^
            --input build\dist ^
            --main-jar app.jar ^
            --win-dir-chooser ^
            --win-menu ^
            --win-shortcut ^
            --java-options "-Dfile.encoding=GBK"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: Build-Output
          path: |
            build/libs/*.jar
            *.exe